<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Dulcería Lupita</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main:   #f8fafc;
            --bg-card:   #112240;
            --bg-sidebar:#1a3560;
            --accent:    #2d6aad;
            --accent2:   #0d9488;
            --border:    rgba(45,106,173,0.20);
            --text-main: #1e293b;
            --text-muted:#64748b;
        }
        body { font-family:'Plus Jakarta Sans',sans-serif; background-color:var(--bg-main);  }
        .glass { background:#ffffff; border:1px solid #e2e8f0; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
        .btn-accent { background:var(--accent); color:#ffffff; }
        .btn-accent:hover { background:#3a7dc4; }
        .btn-orange { background:var(--accent2); color:#ffffff; }
        .btn-orange:hover { opacity:0.9; }
        .input-dark { background:#f8fafc; border:1px solid #cbd5e1; color:#1e293b; }
        .input-dark:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(45,106,173,0.25); outline:none; }
        .input-dark::placeholder { color:#94a3b8; }
        .card-module { background:#ffffff; border:1px solid #e2e8f0; box-shadow:0 2px 8px rgba(0,0,0,0.06); transition:all .25s; }
        .card-module:hover { border-color:var(--accent2); transform:translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,0.5); }
        .escondido { display:none; }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <h1 class="text-5xl font-black mb-8 text-center" style="color:var(--accent2);">DULCERÍA LUPITA</h1>
    <main id="form-registro" class="glass rounded-[2rem] shadow-2xl max-w-md w-full p-10">
        <h2 class="text-2xl font-black text-white mb-2">Crear Cuenta</h2>
        <p class="text-sm mb-8" style="color:var(--text-muted)">Completa los datos para registrarte</p>
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-black uppercase tracking-widest mb-2" style="color:var(--text-muted)">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Tu nombre" maxlength="100" autocomplete="name" class="input-dark w-full px-5 py-3 rounded-xl font-semibold transition-all">
            </div>
            <div>
                <label class="block text-xs font-black uppercase tracking-widest mb-2" style="color:var(--text-muted)">Correo</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com" maxlength="150" autocomplete="email" class="input-dark w-full px-5 py-3 rounded-xl font-semibold transition-all">
            </div>
            <div>
                <label class="block text-xs font-black uppercase tracking-widest mb-2" style="color:var(--text-muted)">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" maxlength="100" autocomplete="new-password" class="input-dark w-full px-5 py-3 rounded-xl font-semibold transition-all">
            </div>
            <div>
                <label class="block text-xs font-black uppercase tracking-widest mb-2" style="color:var(--text-muted)">Rol</label>
                <select id="rol" class="input-dark w-full px-5 py-3 rounded-xl font-semibold transition-all">
                    <option value="Administrativo">Administrativo</option>
                    <option value="Capturista">Capturista</option>
                    <option value="Jefe Almacén">Jefe de Almacén</option>
                </select>
            </div>
            <p id="msg" class="text-xs text-center font-bold hidden"></p>
            <button onclick="registrar()" class="btn-orange w-full py-4 rounded-xl font-black uppercase tracking-widest shadow-lg transition-all active:scale-95">
                Registrar
            </button>
        </div>
        <p class="mt-6 text-center text-sm" style="color:var(--text-muted)">
            ¿Ya tienes cuenta? <a href="/" class="font-black hover:underline" style="color:var(--accent2);">Inicia sesión</a>
        </p>
    </main>
    <div id="acceso-denegado" style="display:none;" class="glass rounded-[2rem] shadow-2xl max-w-md w-full p-10 text-center mt-4">
        <div class="text-5xl mb-4">🔒</div>
        <h2 class="text-xl font-black text-slate-800 mb-2">Acceso restringido</h2>
        <p class="text-sm mb-6" style="color:var(--text-muted)">Solo la <strong>Dueña</strong> puede registrar nuevos usuarios en el sistema.</p>
        <a href="/admin" class="btn-orange px-8 py-3 rounded-full font-black uppercase tracking-widest shadow-lg transition-all active:scale-95 inline-block">← Volver al menú</a>
    </div>
    <script>
        function mostrarMsg(text, ok=false) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'text-xs text-center font-bold ' + (ok ? 'text-green-400' : 'text-red-400');
            msg.classList.remove('hidden');
        }

        async function registrar() {
            const Nombre = document.getElementById('nombre').value.trim();
            const Correo = document.getElementById('correo').value.trim();
            const Pass   = document.getElementById('password').value;
            const Rol    = document.getElementById('rol').value;

            // ── Validaciones ────────────────────────────────────────────────
            if (!Nombre)           return mostrarMsg('El nombre es obligatorio');
            if (Nombre.length < 2) return mostrarMsg('El nombre debe tener al menos 2 caracteres');
            if (!Correo)           return mostrarMsg('El correo es obligatorio');
            const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRe.test(Correo)) return mostrarMsg('El correo no tiene formato válido (ej: usuario@dominio.com)');
            if (!Pass)             return mostrarMsg('La contraseña es obligatoria');
            if (Pass.length < 6)   return mostrarMsg('La contraseña debe tener al menos 6 caracteres');

            try {
                const res  = await fetch('/api/usuarios/registrar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Nombre,Rol,Correo,contraseña_hash:Pass})});
                const data = await res.json();
                if (res.ok) {
                    mostrarMsg('✅ Usuario registrado. Redirigiendo...', true);
                    setTimeout(()=>window.location.href='/admin',1500);
                } else {
                    mostrarMsg(data.error || 'Error al registrar');
                }
            } catch(e) { mostrarMsg('Error de conexión con el servidor'); }
        }

        // Verificar que solo la Dueña puede acceder a esta página
        window.addEventListener('DOMContentLoaded', () => {
            const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
            if (usuario.Rol !== 'Dueña') {
                document.getElementById('form-registro').style.display = 'none';
                document.getElementById('acceso-denegado').style.display = 'block';
            }
        });
    </script>
</body>
</html>
