<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dulcería Lupita</title>

    <style>
        body { font-family: sans-serif; background: #f8fafc; }
        .input-dark { padding: 10px; width: 100%; margin: 5px 0; }
        .btn { background: #0d9488; color: white; padding: 12px; width: 100%; border: none; cursor: pointer; }
        .error { color: red; font-size: 12px; display: none; }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

    <div style="width:300px;">
        <h1 style="text-align:center;">DULCERÍA LUPITA</h1>

        <h3>Iniciar Sesión</h3>

        <input id="user" class="input-dark" type="text" placeholder="Usuario o correo">
        <input id="password" class="input-dark" type="password" placeholder="Contraseña">

        <p id="errorMsg" class="error">Error</p>

        <button class="btn" onclick="iniciarSesion()">Entrar</button>

        <p style="margin-top:10px;">
            ¿No tienes cuenta?
            <a href="register.html">Regístrate</a>
        </p>
    </div>
<script>
document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesion();
});

document.getElementById('user').addEventListener('keydown', e => {
    if (e.key === 'Enter') iniciarSesion();
});

async function iniciarSesion() {
    const user = document.getElementById('user').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');

    if (!user || !password) {
        errorMsg.textContent = 'Ingresa tu correo y contraseña';
        errorMsg.classList.remove('escondido');
        return;
    }

    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(user)) {
        errorMsg.textContent = 'Ingresa un correo válido';
        errorMsg.classList.remove('escondido');
        return;
    }

    try {
        
        if (user && password) {
            sessionStorage.setItem('usuario', user);
            window.location.href = 'index.html';
        }

    } catch (err) {
        errorMsg.textContent = 'Error de conexión';
        errorMsg.classList.remove('escondido');
    }
}
</script>

</body>
</html>
