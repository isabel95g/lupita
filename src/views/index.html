<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcería Lupita</title>

    <style>
        :root {
            --bg-azul: oklch(82.8% 0.111 230.318);
            --texto-amarillo: oklch(94.5% 0.129 101.54);
            --btn-rosita: oklch(89.9% 0.061 343.231);
        }
        body { background-color: var(--bg-azul); }
        .text-amarillo { color: var(--texto-amarillo); }
        .bg-rosita { background-color: var(--btn-rosita); color: oklch(0% 0 0); }
        .escondido { display: none; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- BOTÓN LOGIN -->
    <div class="absolute top-5 right-5">
        <a href="login.html" class="bg-rosita px-4 py-2 rounded-full font-bold shadow-md">
            Login
        </a>
    </div>

    <h1 class="text-5xl md:text-7xl font-black text-amarillo mb-8 drop-shadow-md text-center">
        "DULCERIA LUPITA"
    </h1>

    <main class="flex flex-col md:flex-row bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-2xl overflow-hidden max-w-4xl w-full border-8 border-white">

        <div class="flex-1 bg-white/50 p-10 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-gray-100">
            <h2 class="text-4xl font-bold text-pink-300 leading-tight mb-6">
                BIENVENIDO<br>A TU<br>DULCERIA!
            </h2>

            <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/c12979b2-cbbe-4573-b300-d3d83cd2f941/dc2g33m-3a7724ac-3d4c-4daa-ba6e-8236f469f0d3.png"
                 alt="Cupcake"
                 class="w-40 drop-shadow-xl">
        </div>

        <div class="flex-1 p-10 flex flex-col justify-center">

            <h3 class="text-2xl font-bold text-gray-800 mb-6 text-center">
                Inicio
            </h3>

            <p class="text-center text-gray-500 mb-4">
                Bienvenido a Dulcería Lupita 🍬
            </p>

            <button onclick="sessionStorage.removeItem('usuario'); location.reload();"
                class="bg-rosita w-full py-3 rounded-full font-bold shadow-md">
                Cerrar sesión
            </button>

        </div>

    </main>

    
    <div id="notif-fab"
         onclick="window.location.href='notificaciones.html'"
         style="position:fixed;bottom:2rem;right:2rem;z-index:9990;
                width:56px;height:56px;border-radius:50%;cursor:pointer;
                background:oklch(55% 0.18 250);color:#fff;border:none;
                display:flex;align-items:center;justify-content:center;
                font-size:22px;box-shadow:0 6px 20px rgba(30,80,180,0.45);"
         title="Notificaciones">
        🔔
    </div>

    <script>
        // si no hay sesión, manda al login
        if (!sessionStorage.getItem('usuario')) {
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
