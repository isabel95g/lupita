<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dulcería Lupita</title>

    <style>
        :root {
            --bg-azul: oklch(82.8% 0.111 230.318);
            --texto-amarillo: oklch(94.5% 0.129 101.54);
            --btn-rosita: oklch(89.9% 0.061 343.231);
        }

        body { background-color: var(--bg-azul); }
        .text-amarillo { color: var(--texto-amarillo); }
        .bg-rosita { background-color: var(--btn-rosita); color: black; }
        .escondido { display:none; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

<main class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">

    <h1 class="text-3xl font-bold mb-6 text-center">LOGIN</h1>

    <input id="user" class="w-full border p-2 mb-3 rounded" placeholder="Usuario">

    <input id="password" type="password" class="w-full border p-2 mb-3 rounded" placeholder="Contraseña">

    <p id="error" class="text-red-500 text-sm escondido">Error</p>

    <button onclick="login()"
        class="bg-rosita w-full py-2 rounded font-bold mt-3">
        Entrar
    </button>

</main>

<script>
function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("password").value;
    const error = document.getElementById("error");

    if (!user || !pass) {
        error.classList.remove("escondido");
        error.textContent = "Llena todos los campos";
        return;
    }

    
    if (user === "admin" && pass === "1234") {
        sessionStorage.setItem("usuario", user);
        window.location.href = "index.html";
    } else {
        error.classList.remove("escondido");
        error.textContent = "Usuario incorrecto";
    }
}
</script>

</body>
</html>
