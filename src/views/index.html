<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dulcería Lupita</title>

    <style>
        :root {
            --bg-azul: oklch(82.8% 0.111 230.318);
            --texto-amarillo: oklch(94.5% 0.129 101.54);
            --btn-rosita: oklch(89.9% 0.061 343.231);
        }

        body { background-color: var(--bg-azul); }
        .text-amarillo { color: var(--texto-amarillo); }
        .bg-rosita { background-color: var(--btn-rosita); color: black; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

<h1 class="text-5xl md:text-7xl font-black text-amarillo mb-8 text-center">
    "DULCERÍA LUPITA"
</h1>

<main class="flex flex-col md:flex-row bg-white/90 rounded-[2rem] shadow-2xl overflow-hidden max-w-4xl w-full border-8 border-white">

    <div class="flex-1 bg-white/50 p-10 flex flex-col items-center justify-center">
        <h2 class="text-4xl font-bold text-pink-300 mb-6 text-center">
            BIENVENIDO A TU DULCERÍA
        </h2>
    </div>

    <div class="flex-1 p-10 flex flex-col justify-center gap-4">

        <!--  AQUÍ ESTÁ EL ARREGLO -->
        <a href="login.html"
           class="bg-rosita w-full py-3 rounded-full font-bold text-center shadow-md">
            LOGIN
        </a>

        <a href="contacto.html"
           class="bg-white w-full py-3 rounded-full font-bold text-center border">
            CONTÁCTANOS
        </a>

    </div>

</main>

</body>
</html>
