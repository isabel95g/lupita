<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dulcería Lupita</title>
    <script src="js/admin.js" defer></script>
    <style>
        :root {
            --bg-azul: oklch(82.8% 0.111 230.318);
            --texto-amarillo: oklch(94.5% 0.129 101.54);
            --btn-rosita: oklch(89.9% 0.061 343.231);
        }
        body { background-color: var(--bg-azul); }
        .text-amarillo { color: var(--texto-amarillo); }
        .bg-rosita { background-color: var(--btn-rosita); color: oklch(0% 0 0); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <h1 class="text-5xl md:text-7xl font-black text-amarillo mb-8 drop-shadow-md text-center">
        "DULCERIA LUPITA"
    </h1>

    <main class="bg-white/90 backdrop-blur-sm rounded-[2rem] shadow-2xl overflow-hidden max-w-4xl w-full border-8 border-white p-10">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-pink-300 mb-2">Bienvenido al área de almacenamiento</h2>
            <p class="text-gray-500">Selecciona un módulo para continuar</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <!-- Módulo Inventario -->
            <a href="inventario.html" class="block bg-gradient-to-br from-pink-100 to-pink-50 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all hover:scale-105 border-2 border-pink-200">
                <div class="text-center">
                    <div class="text-5xl mb-4">📦</div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">Inventario</h3>
                    <p class="text-gray-500 text-sm">Gestiona productos, stock, entradas y salidas</p>
                </div>
            </a>

            <!-- Módulo Devoluciones -->
            <a href="devoluciones.html" class="block bg-gradient-to-br from-blue-100 to-blue-50 rounded-2xl p-6 shadow-lg hover:shadow-xl transition-all hover:scale-105 border-2 border-blue-200">
                <div class="text-center">
                    <div class="text-5xl mb-4">🔄</div>
                    <h3 class="text-xl font-bold text-gray-800 mb-2">Devoluciones</h3>
                    <p class="text-gray-500 text-sm">Registra y gestiona devoluciones de productos</p>
                </div>
            </a>
        </div>

        <div class="text-center">
            <button onclick="cerrarSesion()" class="bg-rosita px-8 py-3 rounded-full font-bold shadow-md hover:brightness-95 transition-all uppercase tracking-widest active:scale-95">
                Cerrar sesión
            </button>
        </div>
    </main>
</body>
</html>
