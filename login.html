        async function iniciarSesion() {

            const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (password.length < 1) { errorMsg.textContent = 'Ingresa tu contraseña'; errorMsg.classList.remove('escondido'); return; }
            try {
                const res  = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({user: user.trim().toLowerCase(), password: password}) });

                if (data.success) {
                    // Guardar sesión en sessionStorage para uso del frontend
                    sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
